<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create New Password | Printssistant</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="background-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <main style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
      <div class="auth-card glass" style="max-width: 400px;">
        <h2 id="page-title">Create New Password</h2>
        <p id="page-subtitle" style="opacity: 0.8; margin-bottom: 1.5rem;">Enter a new password for your account.</p>
        
        <form id="reset-form" class="auth-form">
          <input
            type="password"
            id="reset-password"
            class="glass-input auth-input"
            placeholder="New password"
            required
            autocomplete="new-password"
            minlength="6"
          />
          <input
            type="password"
            id="reset-password-confirm"
            class="glass-input auth-input"
            placeholder="Confirm password"
            required
            autocomplete="new-password"
            minlength="6"
          />
          <button type="submit" id="reset-submit-btn" class="btn-primary auth-submit">
            Update Password
          </button>
          <p id="reset-error" class="auth-error hidden"></p>
          <p id="reset-success" class="auth-success hidden"></p>
        </form>

        <p style="text-align: center; margin-top: 1.5rem;">
          <a href="/" class="auth-toggle-link">Back to sign in</a>
        </p>
      </div>
    </main>

    <style>
      .auth-success {
        color: #4ade80;
        font-size: 0.9rem;
        text-align: center;
        margin-top: 1rem;
      }
      
      .auth-success.hidden {
        display: none;
      }

      .auth-error.hidden {
        display: none;
      }
    </style>

    <script>
      const resetForm = document.getElementById('reset-form');
      const resetPassword = document.getElementById('reset-password');
      const resetPasswordConfirm = document.getElementById('reset-password-confirm');
      const resetSubmitBtn = document.getElementById('reset-submit-btn');
      const resetError = document.getElementById('reset-error');
      const resetSuccess = document.getElementById('reset-success');
      const pageTitle = document.getElementById('page-title');
      const pageSubtitle = document.getElementById('page-subtitle');

      // Get token from URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      // Validate token on page load
      if (!token) {
        pageTitle.textContent = 'Invalid Reset Link';
        pageSubtitle.textContent = 'The password reset link is missing. Please request a new one.';
        resetForm.style.display = 'none';
        resetError.textContent = 'Invalid reset link';
        resetError.classList.remove('hidden');
      } else {
        // Check if token is valid
        fetch(`/auth/reset-password/${token}`)
          .then((res) => {
            if (!res.ok) throw new Error('Invalid or expired link');
            return res.json();
          })
          .then((data) => {
            // Token is valid
            console.log('Reset token valid for:', data.email);
          })
          .catch((error) => {
            pageTitle.textContent = 'Invalid or Expired Link';
            pageSubtitle.textContent = 'This reset link is invalid or has expired. Please request a new one.';
            resetForm.style.display = 'none';
            resetError.textContent = error.message;
            resetError.classList.remove('hidden');
          });
      }

      resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        resetError.classList.add('hidden');
        resetSuccess.classList.add('hidden');

        const password = resetPassword.value;
        const passwordConfirm = resetPasswordConfirm.value;

        if (!password || !passwordConfirm) {
          resetError.textContent = 'Please fill in all fields';
          resetError.classList.remove('hidden');
          return;
        }

        if (password !== passwordConfirm) {
          resetError.textContent = 'Passwords do not match';
          resetError.classList.remove('hidden');
          return;
        }

        if (password.length < 6) {
          resetError.textContent = 'Password must be at least 6 characters';
          resetError.classList.remove('hidden');
          return;
        }

        resetSubmitBtn.disabled = true;
        resetSubmitBtn.textContent = 'Updating...';

        try {
          const response = await fetch('/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.detail || 'Failed to update password');
          }

          resetSuccess.textContent = 'Password updated! Redirecting to login...';
          resetSuccess.classList.remove('hidden');

          // Redirect to login after 2 seconds
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        } catch (error) {
          resetError.textContent = error.message || 'Failed to update password';
          resetError.classList.remove('hidden');
        } finally {
          resetSubmitBtn.disabled = false;
          resetSubmitBtn.textContent = 'Update Password';
        }
      });
    </script>
  </body>
</html>
