<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DG Preflight | Printssistant</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <style>
      /* ── Preflight-specific styles ───────────────────────────────────────── */
      .preflight-wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 6rem 1.5rem 4rem;
      }

      .preflight-header {
        text-align: center;
        margin-bottom: 2.5rem;
      }
      .preflight-header h1 { font-size: 2.2rem; font-weight: 800; }
      .preflight-header h1 span { color: var(--primary-light); }
      .preflight-header p { color: rgba(248,250,252,0.6); margin-top: 0.5rem; }

      /* ── Drop zone ───────────────────────────────────────────────────────── */
      .drop-zone {
        border: 2px dashed var(--glass-border);
        border-radius: 12px;
        padding: 3rem 2rem;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        background: var(--glass-bg);
      }
      .drop-zone.drag-over {
        border-color: var(--primary-light);
        background: rgba(193, 53, 132, 0.08);
      }
      .drop-zone-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
      .drop-zone p { color: rgba(248,250,252,0.7); font-size: 0.95rem; }
      .drop-zone strong { color: var(--text-white); }
      #file-input { display: none; }

      .limits-note {
        font-size: 0.78rem;
        color: rgba(248,250,252,0.4);
        margin-top: 0.75rem;
      }

      /* ── Processing state ────────────────────────────────────────────────── */
      .spinner {
        display: inline-block;
        width: 20px; height: 20px;
        border: 2px solid rgba(255,255,255,0.2);
        border-top-color: var(--primary-light);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 0.5rem;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Results card ────────────────────────────────────────────────────── */
      .results-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 1.75rem;
        margin-top: 2rem;
      }

      .results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .results-title { font-size: 1.1rem; font-weight: 600; }
      .results-meta { font-size: 0.8rem; color: rgba(248,250,252,0.5); }

      .overall-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.9rem;
        border-radius: 99px;
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.02em;
      }
      .badge-pass  { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
      .badge-warn  { background: rgba(234,179,8,0.15);  color: #facc15; border: 1px solid rgba(234,179,8,0.3); }
      .badge-fail  { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

      /* ── Check rows ──────────────────────────────────────────────────────── */
      .check-list { display: flex; flex-direction: column; gap: 0.75rem; }

      .check-row {
        display: flex;
        align-items: flex-start;
        gap: 1rem;
        padding: 0.85rem 1rem;
        border-radius: 8px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
      }

      .check-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 0.1rem; }

      .check-body { flex: 1; min-width: 0; }
      .check-name { font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.04em; color: rgba(248,250,252,0.5); margin-bottom: 0.15rem; }
      .check-message { font-size: 0.95rem; font-weight: 600; }
      .check-detail { font-size: 0.82rem; color: rgba(248,250,252,0.55); margin-top: 0.2rem; }

      .check-status-badge {
        flex-shrink: 0;
        padding: 0.25rem 0.6rem;
        border-radius: 99px;
        font-size: 0.75rem;
        font-weight: 700;
      }

      /* ── Share section ───────────────────────────────────────────────────── */
      .share-section {
        margin-top: 1.5rem;
        padding-top: 1.25rem;
        border-top: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .share-label { font-size: 0.85rem; color: rgba(248,250,252,0.6); white-space: nowrap; }
      .share-url-box {
        flex: 1;
        background: rgba(0,0,0,0.3);
        border: 1px solid var(--glass-border);
        border-radius: 6px;
        padding: 0.45rem 0.75rem;
        font-size: 0.8rem;
        color: rgba(248,250,252,0.7);
        font-family: monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }
      .btn-copy {
        background: transparent;
        border: 1px solid var(--primary-light);
        color: var(--primary-light);
        padding: 0.4rem 0.85rem;
        border-radius: 6px;
        font-size: 0.82rem;
        cursor: pointer;
        transition: background 0.2s;
        white-space: nowrap;
      }
      .btn-copy:hover { background: var(--primary-light); color: white; }

      /* ── Error / status messages ─────────────────────────────────────────── */
      .status-msg {
        text-align: center;
        padding: 1rem;
        border-radius: 8px;
        margin-top: 1.5rem;
        font-size: 0.9rem;
      }
      .status-msg.error { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
      .status-msg.info  { background: rgba(99,102,241,0.1); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }

      .hidden { display: none !important; }

      .run-again-btn {
        margin-top: 1.25rem;
        width: 100%;
        padding: 0.75rem;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--glass-border);
        color: var(--text-white);
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: background 0.2s;
      }
      .run-again-btn:hover { background: rgba(255,255,255,0.1); }
    </style>
  </head>
  <body>
    <div class="background-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-links">
          <a href="/" class="nav-link">Home</a>
          <a href="/preflight" class="nav-link">DG Preflight</a>
          <a href="/blog" class="nav-link">Blog</a>
          <a href="/suggest-idea" class="nav-link">Suggest an Idea</a>
        </div>
        <div style="display:flex; align-items:center; gap:0.75rem;">
          <a id="nav-profile-link" href="/profile" class="nav-link hidden">My Profile</a>
          <button id="nav-auth-btn" class="nav-link nav-sign-in">Sign In</button>
        </div>
      </div>
    </nav>

    <div class="preflight-wrap">
      <div class="preflight-header">
        <h1>DG Preflight<span>.</span></h1>
        <p>Check your PDF for print readiness — bleeds, color mode, resolution, and more.</p>
      </div>

      <!-- Upload / drag-drop zone -->
      <div id="drop-zone" class="drop-zone">
        <div class="drop-zone-icon">📄</div>
        <p><strong>Drop a PDF here</strong> or click to browse</p>
        <p class="limits-note" id="limit-note">Free: 10 MB · 5 checks/month &nbsp;|&nbsp; Pro: 50 MB · unlimited</p>
        <input type="file" id="file-input" accept=".pdf,application/pdf" />
      </div>

      <!-- Processing indicator -->
      <div id="processing-msg" class="status-msg info hidden">
        <span class="spinner"></span> Running preflight checks…
      </div>

      <!-- Error message -->
      <div id="error-msg" class="status-msg error hidden"></div>

      <!-- Results -->
      <div id="results-card" class="results-card hidden">
        <div class="results-header">
          <div>
            <div class="results-title" id="results-filename"></div>
            <div class="results-meta" id="results-meta"></div>
          </div>
          <div id="overall-badge" class="overall-badge"></div>
        </div>

        <div class="check-list" id="check-list"></div>

        <div class="share-section">
          <span class="share-label">Share results:</span>
          <span class="share-url-box" id="share-url"></span>
          <button class="btn-copy" id="copy-btn">Copy link</button>
        </div>

        <button class="run-again-btn" id="run-again-btn">Check another file</button>
      </div>
    </div>

    <script>
    // ── Constants ──────────────────────────────────────────────────────────────
    const TOKEN_KEY = 'ps_token';

    const CHECK_LABELS = {
      file_size:    'File Size',
      bleeds:       'Bleeds',
      color_mode:   'Color Mode',
      safe_margins: 'Safe Margins',
      resolution:   'Resolution',
    };

    const STATUS_ICON = { pass: '✅', warn: '⚠️', fail: '❌' };
    const STATUS_COLOR = {
      pass: 'badge-pass',
      warn: 'badge-warn',
      fail: 'badge-fail',
    };

    // ── Auth init ──────────────────────────────────────────────────────────────
    async function initAuth() {
      const token = localStorage.getItem(TOKEN_KEY);
      const authBtn = document.getElementById('nav-auth-btn');
      const profileLink = document.getElementById('nav-profile-link');

      if (token) {
        try {
          const resp = await fetch('/auth/me', { headers: { Authorization: `Bearer ${token}` } });
          if (resp.ok) {
            const user = await resp.json();
            authBtn.textContent = 'Sign Out';
            profileLink.classList.remove('hidden');
            if (user.is_pro) {
              document.getElementById('limit-note').textContent = 'Pro: 50 MB · unlimited checks';
            }
            return user;
          }
        } catch (_) {}
        localStorage.removeItem(TOKEN_KEY);
      }
      authBtn.textContent = 'Sign In';
      authBtn.onclick = () => window.location.href = '/';
      return null;
    }

    // ── Drop zone wiring ───────────────────────────────────────────────────────
    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const procMsg    = document.getElementById('processing-msg');
    const errorMsg   = document.getElementById('error-msg');
    const resultsCard = document.getElementById('results-card');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) runPreflight(file);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) runPreflight(fileInput.files[0]);
    });

    document.getElementById('run-again-btn').addEventListener('click', resetUI);

    document.getElementById('copy-btn').addEventListener('click', () => {
      const url = document.getElementById('share-url').textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy link', 2000);
      });
    });

    // ── Main preflight flow ────────────────────────────────────────────────────
    async function runPreflight(file) {
      if (!file.name.toLowerCase().endsWith('.pdf') && file.type !== 'application/pdf') {
        showError('Only PDF files are accepted.');
        return;
      }

      resetUI(false);
      dropZone.classList.add('hidden');
      procMsg.classList.remove('hidden');

      const formData = new FormData();
      formData.append('file', file);

      const token = localStorage.getItem(TOKEN_KEY);
      const headers = token ? { Authorization: `Bearer ${token}` } : {};

      try {
        const resp = await fetch('/api/preflight', { method: 'POST', headers, body: formData });
        const data = await resp.json();

        if (!resp.ok) {
          showError(data.detail || 'Preflight failed. Please try again.');
          return;
        }

        showResults(data, file.name);
      } catch (err) {
        showError('Network error. Please check your connection and try again.');
      } finally {
        procMsg.classList.add('hidden');
      }
    }

    function showResults(data, filename) {
      document.getElementById('results-filename').textContent = filename || data.filename || 'Uploaded file';
      document.getElementById('results-meta').textContent =
        `${data.page_count} page${data.page_count !== 1 ? 's' : ''} · ${(data.checks?.file_size?.message || '')}`;

      // Overall badge
      const ob = document.getElementById('overall-badge');
      const overallLabels = { pass: '✅ Print Ready', warn: '⚠️ Warnings', fail: '❌ Issues Found' };
      ob.textContent = overallLabels[data.overall] || data.overall;
      ob.className = `overall-badge ${STATUS_COLOR[data.overall] || ''}`;

      // Check rows
      const list = document.getElementById('check-list');
      list.innerHTML = '';
      const order = ['bleeds', 'color_mode', 'file_size', 'safe_margins', 'resolution'];
      for (const key of order) {
        const check = data.checks?.[key];
        if (!check) continue;
        const row = document.createElement('div');
        row.className = 'check-row';
        row.innerHTML = `
          <div class="check-icon">${STATUS_ICON[check.status] || '❓'}</div>
          <div class="check-body">
            <div class="check-name">${CHECK_LABELS[key] || key}</div>
            <div class="check-message">${check.message}</div>
            ${check.detail ? `<div class="check-detail">${check.detail}</div>` : ''}
          </div>
          <div class="check-status-badge ${STATUS_COLOR[check.status] || ''}">${check.status.toUpperCase()}</div>
        `;
        list.appendChild(row);
      }

      // Share URL
      const shareUrl = `${window.location.origin}/preflight/${data.job_id}`;
      document.getElementById('share-url').textContent = shareUrl;

      resultsCard.classList.remove('hidden');
    }

    function showError(msg) {
      dropZone.classList.remove('hidden');
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
    }

    function resetUI(showDrop = true) {
      errorMsg.classList.add('hidden');
      resultsCard.classList.add('hidden');
      procMsg.classList.add('hidden');
      if (showDrop) dropZone.classList.remove('hidden');
      fileInput.value = '';
    }

    // ── Load shared result from URL (e.g. /preflight/<job_id>) ────────────────
    async function loadSharedResult() {
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      // path is /preflight/<job_id>
      if (pathParts.length < 2) return;

      const jobId = pathParts[1];
      dropZone.classList.add('hidden');
      procMsg.classList.remove('hidden');

      try {
        const resp = await fetch(`/api/preflight/${jobId}`);
        const data = await resp.json();

        if (resp.status === 410) {
          showError('This preflight result has expired. Please run a new check.');
          return;
        }
        if (resp.status === 404) {
          showError('Preflight result not found. The link may be invalid.');
          return;
        }
        if (!resp.ok) {
          showError(data.detail || 'Result not found.');
          return;
        }
        // Job is still processing — tell the user to wait
        if (data.status === 'processing') {
          showError('Still processing — try again in a few seconds.');
          return;
        }
        // Merge filename from DB
        showResults({ ...data.results, job_id: data.id, page_count: data.results?.page_count || 0 }, data.filename);
      } catch (_) {
        showError('Could not load result. The link may have expired.');
      } finally {
        procMsg.classList.add('hidden');
      }
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    initAuth().then(() => {
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      if (pathParts.length >= 2 && pathParts[0] === 'preflight') {
        loadSharedResult();
      }
    });

    document.getElementById('nav-auth-btn').addEventListener('click', function() {
      if (this.textContent === 'Sign Out') {
        localStorage.removeItem(TOKEN_KEY);
        window.location.reload();
      } else {
        window.location.href = '/';
      }
    });

    // ── Suggest Idea Modal ────────────────────────────────────────────────────
    function showSuggestIdeaModal() {
      const existing = document.getElementById('suggest-idea-modal');
      if (existing) existing.remove();

      const modal = document.createElement('div');
      modal.id = 'suggest-idea-modal';
      modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);';
      modal.innerHTML = `
        <div style="background:var(--glass-bg,#1a1a2e);border:1px solid var(--glass-border,rgba(255,255,255,0.1));border-radius:12px;padding:2rem;max-width:480px;width:90%;color:#f8fafc;position:relative;">
          <button id="suggest-close" style="position:absolute;top:0.75rem;right:0.75rem;background:none;border:none;color:rgba(248,250,252,0.6);font-size:1.3rem;cursor:pointer;">&times;</button>
          <h3 style="margin:0 0 0.5rem;font-size:1.3rem;font-weight:700;">Suggest an Idea</h3>
          <p style="color:rgba(248,250,252,0.6);font-size:0.9rem;margin-bottom:1.25rem;">Have a feature idea or improvement? We'd love to hear it!</p>
          <textarea id="suggest-text" rows="4" placeholder="Describe your idea..." style="width:100%;padding:0.65rem;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:#f8fafc;font-size:0.9rem;resize:vertical;box-sizing:border-box;"></textarea>
          <button id="suggest-submit" style="margin-top:1rem;width:100%;padding:0.65rem;border:none;border-radius:8px;background:var(--primary-light,#c13584);color:white;font-weight:600;font-size:0.95rem;cursor:pointer;">Submit Idea</button>
          <p id="suggest-status" style="text-align:center;margin-top:0.75rem;font-size:0.85rem;color:rgba(248,250,252,0.5);display:none;"></p>
        </div>
      `;
      document.body.appendChild(modal);

      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
      document.getElementById('suggest-close').addEventListener('click', () => modal.remove());

      document.getElementById('suggest-submit').addEventListener('click', async () => {
        const text = document.getElementById('suggest-text').value.trim();
        const statusEl = document.getElementById('suggest-status');
        if (!text) {
          statusEl.textContent = 'Please enter your idea first.';
          statusEl.style.display = 'block';
          statusEl.style.color = '#f87171';
          return;
        }
        statusEl.textContent = 'Submitting...';
        statusEl.style.display = 'block';
        statusEl.style.color = 'rgba(248,250,252,0.5)';

        try {
          const token = localStorage.getItem(TOKEN_KEY);
          const headers = { 'Content-Type': 'application/json' };
          if (token) headers['Authorization'] = `Bearer ${token}`;
          const resp = await fetch('/api/suggest-idea', {
            method: 'POST',
            headers,
            body: JSON.stringify({ idea: text }),
          });
          if (resp.ok) {
            statusEl.textContent = 'Thanks! Your idea has been submitted.';
            statusEl.style.color = '#4ade80';
            document.getElementById('suggest-text').value = '';
            setTimeout(() => modal.remove(), 2000);
          } else {
            statusEl.textContent = 'Could not submit. Please try again.';
            statusEl.style.color = '#f87171';
          }
        } catch {
          statusEl.textContent = 'Network error. Please try again.';
          statusEl.style.color = '#f87171';
        }
      });
    }

    // Intercept "Suggest an Idea" nav link
    document.querySelectorAll('a.nav-link').forEach(link => {
      if (link.getAttribute('href') === '/suggest-idea') {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          showSuggestIdeaModal();
        });
      }
    });
    </script>
  </body>
</html>
