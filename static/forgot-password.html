<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Printssistant</title>
    <link rel="stylesheet" href="static/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="background-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <main style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
      <div class="auth-card glass" style="max-width: 400px;">
        <h2>Reset Your Password</h2>
        <p style="opacity: 0.8; margin-bottom: 1.5rem;">Enter your email address and we'll send you a link to create a new password.</p>
        
        <form id="forgot-form" class="auth-form">
          <input
            type="email"
            id="forgot-email"
            class="glass-input auth-input"
            placeholder="Email address"
            required
            autocomplete="email"
          />
          <button type="submit" id="forgot-submit-btn" class="btn-primary auth-submit">
            Send Reset Link
          </button>
          <p id="forgot-error" class="auth-error hidden"></p>
          <p id="forgot-success" class="auth-success hidden"></p>
        </form>

        <p style="text-align: center; margin-top: 1.5rem;">
          Remember your password? <a href="/" class="auth-toggle-link">Sign in here</a>
        </p>
      </div>
    </main>

    <style>
      .auth-success {
        color: #4ade80;
        font-size: 0.9rem;
        text-align: center;
        margin-top: 1rem;
      }
      
      .auth-success.hidden {
        display: none;
      }
    </style>

    <script>
      const forgotForm = document.getElementById('forgot-form');
      const forgotEmail = document.getElementById('forgot-email');
      const forgotSubmitBtn = document.getElementById('forgot-submit-btn');
      const forgotError = document.getElementById('forgot-error');
      const forgotSuccess = document.getElementById('forgot-success');

      forgotForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        forgotError.classList.add('hidden');
        forgotSuccess.classList.add('hidden');

        const email = forgotEmail.value.trim();
        if (!email) {
          forgotError.textContent = 'Please enter your email';
          forgotError.classList.remove('hidden');
          return;
        }

        forgotSubmitBtn.disabled = true;
        forgotSubmitBtn.textContent = 'Sending...';

        try {
          const response = await fetch('/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.detail || 'Failed to send reset link');
          }

          forgotSuccess.textContent = 'Reset link sent! Check your email (it may take a minute).';
          forgotSuccess.classList.remove('hidden');
          forgotEmail.value = '';
        } catch (error) {
          forgotError.textContent = error.message || 'Failed to send reset link';
          forgotError.classList.remove('hidden');
        } finally {
          forgotSubmitBtn.disabled = false;
          forgotSubmitBtn.textContent = 'Send Reset Link';
        }
      });
    </script>
  </body>
</html>
